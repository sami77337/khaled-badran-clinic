name: Django checks

on:
  push:
    branches:
      - main
      - "feat/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DJANGO_SECRET_KEY: ci-placeholder-not-a-secret
      DJANGO_DEBUG: "true"
      DJANGO_PRODUCTION: "false"
      DATABASE_URL: ""
      CACHE_URL: ""
      BOOKING_TRUST_X_FORWARDED_FOR: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run Django checks
        run: python manage.py check

      - name: Review local deploy checks
        run: python manage.py check --deploy

      - name: Apply local CI migrations for smoke checks
        run: python manage.py migrate --noinput

      - name: Run deployment smoke
        run: python manage.py deployment_smoke

      - name: Run deployment smoke JSON
        run: python manage.py deployment_smoke --json

      - name: Run project status report
        run: python manage.py project_status_report

      - name: Run project status report JSON
        run: python manage.py project_status_report --json

      - name: Run production settings report
        run: python manage.py production_settings_report

      - name: Run production settings report JSON
        run: python manage.py production_settings_report --json

      - name: Run tests
        run: python manage.py test
